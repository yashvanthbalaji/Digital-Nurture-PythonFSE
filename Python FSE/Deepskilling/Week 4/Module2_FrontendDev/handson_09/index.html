<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal - Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!--
  ACCESSIBILITY AUDIT NOTES (Hands-On 9)

  Baseline Lighthouse Accessibility score: 100/100
  Automated issues flagged: none — Lighthouse's automated checks found
  zero accessibility violations on the pre-existing Hands-On 3 markup.

  Lighthouse itself notes that automated tools "can only detect a subset
  of issues" and lists several items that require manual verification
  (keyboard focusability, logical tab order, focus not trapped, etc.).
  This hands-on's remaining steps manually verify and harden those areas
  even though the automated score was already perfect:
    - Added a <label> for the search input (was unlabeled, though this
      didn't trip Lighthouse's automated check)
    - No <img> elements exist in this project, so alt-text checks don't apply
    - Converted the hamburger from a <span> to a real <button> for guaranteed
      keyboard focusability/activation
    - Added aria-label to <nav>, aria-current="page" to the active link
    - Added tabindex + keydown (Enter) support to course cards
    - Added a role="status" aria-live="polite" results counter
    - Darkened low-contrast gray text to meet WCAG AA 4.5:1 (see styles.css)
-->

  <header>
    <div class="site-name">Student Portal</div>
    <button id="menu-toggle" aria-expanded="false" aria-controls="main-nav">&#9776; Menu</button>
    <nav id="main-nav" aria-label="Main navigation">
      <ul>
        <li><a href="#" aria-current="page">Home</a></li>
        <li><a href="#courses">Courses</a></li>
        <li><a href="#">Profile</a></li>
        <li><a href="#">Grades</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="hero">
      <h1>Welcome to the Student Portal</h1>
      <p>Track your courses, grades, and notifications all in one place.</p>
      <button>Explore Courses</button>
    </section>

    <section id="stats">
      <div class="stat-item">
        <span class="stat-number">3</span>
        <span class="stat-label">Courses Enrolled</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">3.8</span>
        <span class="stat-label">GPA</span>
      </div>
      <div class="stat-item">
        <span class="stat-number">6</span>
        <span class="stat-label">Semester</span>
      </div>
    </section>

    <section id="courses">
      <h2>Enrolled Courses</h2>

      <label for="search-courses">Search courses:</label>
      <input type="text" id="search-courses" placeholder="Search courses...">
      <button id="sort-btn">Sort by Credits</button>

      <p id="results-count" role="status" aria-live="polite"></p>

      <div class="course-grid"></div>

      <p id="total-credits"></p>
      <div id="selected-course"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Student Portal. All rights reserved.</p>
  </footer>

  <!-- polyfills CSS custom properties (var(--x)) for older browsers like IE11 -->
  <script src="https://cdn.jsdelivr.net/npm/css-vars-ponyfill@2/dist/css-vars-ponyfill.min.js"></script>
  <script>
    cssVars({ watch: true });
  </script>
  <script type="module" src="app.js"></script>

</body>
</html>
